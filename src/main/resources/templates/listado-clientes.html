<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Clientes</title>
</head>
<body>

<div class="container">
    <h1>Directorio de Clientes</h1>

    <a th:href="@{/clientes/nuevo}" class="btn-add">+ Registrar Nuevo Cliente</a>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre Completo</th>
            <th>Correo Electrónico</th>
            <th>Teléfono</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cliente : ${clientes}">
            <td th:text="${cliente.id_cliente}"></td>
            <td th:text="${cliente.nombre}"></td>
            <td th:text="${cliente.correo}"></td>
            <td th:text="${cliente.telefono}"></td>
            <td class="actions">
                <a th:href="@{/clientes/actualizar/{id}(id=${cliente.id_cliente})}" class="btn-edit">Editar</a>

                <a th:href="@{/clientes/eliminar/{id}(id=${cliente.id_cliente})}" class="btn-delete">Eliminar</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(clientes)}">
            <td colspan="5" style="text-align: center; color: #999;">No hay clientes registrados actualmente.</td>
        </tr>
        </tbody>
    </table>

    <div class="nav-links">
        <a th:href="@{/pedidos}">Ir a Gestión de Pedidos →</a>
    </div>
</div>

</body>
</html>
