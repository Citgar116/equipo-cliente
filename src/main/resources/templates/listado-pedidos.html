<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pedidos | RP Electronics</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="/plugins/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" href="/dist/css/adminlte.min.css">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
            </li>
        </ul>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link" data-widget="fullscreen" href="#" role="button">
                    <i class="fas fa-expand-arrows-alt"></i>
                </a>
            </li>
        </ul>
    </nav>

    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <a th:href="@{/auth/menu}" class="brand-link">
            <img src="/dist/img/AdminLTELogo.png" alt="Logo" class="brand-image img-circle elevation-3" style="opacity: .8">
            <span class="brand-text font-weight-light">RP Electronics</span>
        </a>

        <div class="sidebar">
            <div class="user-panel mt-3 pb-3 mb-3 d-flex">
                <div class="image">
                    <img src="/dist/img/user2-160x160.jpg" class="img-circle elevation-2" alt="User Image">
                </div>
                <div class="info">
                    <a href="#" class="d-block">Nombre de usuario</a>
                </div>
            </div>

            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
                    <li class="nav-item">
                        <a th:href="@{/auth/menu}" class="nav-link">
                            <i class="nav-icon fas fa-home"></i>
                            <p>Inicio</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/auth/listado-clientes}" class="nav-link">
                            <i class="nav-icon fas fa-users"></i>
                            <p>Clientes</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/auth/listado-pedidos}" class="nav-link active">
                            <i class="nav-icon fas fa-shopping-cart"></i>
                            <p>Pedidos</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/auth/estadisticas}" class="nav-link">
                            <i class="nav-icon fas fa-chart-bar"></i>
                            <p>Estadísticas</p>
                        </a>
                    </li>
                    <li class="nav-item border-top mt-2"><a th:href="@{/logout}" class="nav-link"><i class="nav-icon fas fa-sign-out-alt text-danger"></i><p>Salir</p></a></li>
                </ul>
            </nav>
        </div>
    </aside>

    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1>Gestión de Pedidos</h1>
                    </div>
                    <div class="col-sm-6">
                        <div class="float-sm-right">
                            <a th:href="@{/pedidos/nuevo}" class="btn btn-success">
                                <i class="fas fa-cart-plus mr-1"></i> Crear Nuevo Pedido
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div class="card card-info card-outline">
                    <div class="card-header border-0">
                        <h3 class="card-title">Historial de Pedidos</h3>
                    </div>
                    <div class="card-body table-responsive p-0">
                        <table class="table table-striped table-valign-middle">
                            <thead>
                            <tr>
                                <th>ID Pedido</th>
                                <th>ID Cliente</th>
                                <th>Fecha</th>
                                <th>Total</th>
                                <th>Estado</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="pedido : ${pedidos}">
                                <td th:text="${pedido.id_pedido}" class="font-weight-bold"></td>
                                <td>
                                    <span class="badge badge-light">#<span th:text="${pedido.id_cliente}"></span></span>
                                </td>
                                <td th:text="${#temporals.format(pedido.fecha, 'dd/MM/yyyy')}"></td>
                                <td>
                                    <span class="text-success font-weight-bold" th:text="'$' + ${#numbers.formatDecimal(pedido.total, 1, 2)}"></span>
                                </td>
                                <td>
                    <span th:text="${pedido.estado}"
                          th:classappend="${pedido.estado == 'Pendiente' ? 'badge badge-warning' : 'badge badge-success'}">
                    </span>
                                </td>
                                <td class="text-center">
                                    <a th:href="@{/pedidos/actualizar/{id}(id=${pedido.id_pedido})}" class="btn btn-info btn-sm">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a th:href="@{/pedidos/eliminar/{id}(id=${pedido.id_pedido})}" class="btn btn-danger btn-sm" onclick="return confirm('¿Eliminar este pedido?')">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(pedidos)}">
                                <td colspan="6" class="text-center text-muted py-4">No hay pedidos registrados.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="mt-3">
                    <a th:href="@{/auth/listado-clientes}" class="btn btn-link text-info">
                        <i class="fas fa-arrow-left"></i> Ver Listado de Clientes
                    </a>
                </div>
            </div>
        </section>
    </div>

    <footer class="main-footer">
        <strong>Copyright &copy; 2026 RP Electronics.</strong>
    </footer>
</div>

<script src="/plugins/jquery/jquery.min.js"></script>
<script src="/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/dist/js/adminlte.min.js"></script>
</body>
</html>
