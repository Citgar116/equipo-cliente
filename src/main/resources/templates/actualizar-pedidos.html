<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Actualizar Pedido</title>
</head>
<body>

<div class="container">
    <h2>Modificar Pedido</h2>
    <hr>

    <form th:action="@{/pedidos/guardar}" th:object="${pedido}" method="post">

        <input type="hidden" th:field="*{id_pedido}" />

        <div class="form-group">
            <label>ID Cliente:</label>
            <input type="number" th:field="*{id_cliente}" readonly style="background-color: #e9ecef;" />
            <small>El ID del cliente no se puede modificar por seguridad.</small>
        </div>

        <div class="form-group">
            <label>Fecha del Pedido:</label>
            <input type="date" th:field="*{fecha}" required />
        </div>

        <div class="form-group">
            <label>Total ($):</label>
            <input type="number" step="0.01" th:field="*{total}" placeholder="0.00" required />
        </div>

        <div class="form-group">
            <label>Estado del Pedido:</label>
            <select th:field="*{estado}">
                <option value="Pendiente">Pendiente</option>
                <option value="Pagado">Pagado</option>
                <option value="Enviado">Enviado</option>
                <option value="Cancelado">Cancelado</option>
            </select>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn-update">Guardar Cambios</button>
            <a th:href="@{/pedidos}" class="btn-back">Volver al listado</a>
        </div>
    </form>
</div>

</body>
</html>
