<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nuevo Pedido | RP Electronics</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="/plugins/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" href="/dist/css/adminlte.min.css">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
            </li>
        </ul>
    </nav>

    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <a th:href="@{/auth/menu}" class="brand-link">
            <img src="/dist/img/AdminLTELogo.png" alt="Logo" class="brand-image img-circle elevation-3" style="opacity: .8">
            <span class="brand-text font-weight-light">RP Electronics</span>
        </a>
        <div class="sidebar">
            <div class="user-panel mt-3 pb-3 mb-3 d-flex">
                <div class="image">
                    <img src="/dist/img/user2-160x160.jpg" class="img-circle elevation-2" alt="User Image">
                </div>
                <div class="info">
                    <a href="#" class="d-block">Citla</a>
                </div>
            </div>
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" role="menu">
                    <li class="nav-item"><a th:href="@{/auth/menu}" class="nav-link"><i class="nav-icon fas fa-home"></i><p>Inicio</p></a></li>
                    <li class="nav-item"><a th:href="@{/clientes}" class="nav-link"><i class="nav-icon fas fa-users"></i><p>Clientes</p></a></li>
                    <li class="nav-item"><a th:href="@{/pedidos}" class="nav-link active"><i class="nav-icon fas fa-shopping-cart"></i><p>Pedidos</p></a></li>
                </ul>
            </nav>
        </div>
    </aside>

    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <h1>Registrar Nuevo Pedido</h1>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div class="row justify-content-center">
                    <div class="col-md-8">

                        <div class="card card-success card-outline">
                            <div class="card-header">
                                <h3 class="card-title"><i class="fas fa-cart-plus mr-2"></i>Detalles del Pedido</h3>
                            </div>

                            <form th:action="@{/pedidos/guardar}" th:object="${pedido}" method="post">
                                <div class="card-body">

                                    <div class="form-group">
                                        <label for="id_cliente">ID del Cliente</label>
                                        <div class="input-group">
                                            <div class="input-group-prepend">
                                                <span class="input-group-text"><i class="fas fa-user-tag"></i></span>
                                            </div>
                                            <input type="number" th:field="*{id_cliente}" class="form-control" id="id_cliente" placeholder="Ingrese el ID del cliente" required>
                                        </div>
                                        <small class="text-muted">Asegúrese de que el ID exista en el directorio de clientes.</small>
                                    </div>

                                    <div class="form-group">
                                        <label for="fecha">Fecha del Pedido</label>
                                        <div class="input-group">
                                            <div class="input-group-prepend">
                                                <span class="input-group-text"><i class="fas fa-calendar-alt"></i></span>
                                            </div>
                                            <input type="date" th:field="*{fecha}" class="form-control" id="fecha" required>
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <label for="total">Monto Total ($)</label>
                                        <div class="input-group">
                                            <div class="input-group-prepend">
                                                <span class="input-group-text"><i class="fas fa-dollar-sign"></i></span>
                                            </div>
                                            <input type="number" step="0.01" th:field="*{total}" class="form-control" id="total" placeholder="0.00" required>
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <label for="estado">Estado del Pedido</label>
                                        <div class="input-group">
                                            <div class="input-group-prepend">
                                                <span class="input-group-text"><i class="fas fa-info-circle"></i></span>
                                            </div>
                                            <select th:field="*{estado}" class="form-control" id="estado" required>
                                                <option value="" disabled selected>Seleccione un estado...</option>
                                                <option value="Pendiente">Pendiente</option>
                                                <option value="Pagado">Pagado</option>
                                                <option value="Cancelado">Cancelado</option>
                                            </select>
                                        </div>
                                    </div>

                                </div>
                                <div class="card-footer text-right">
                                    <a th:href="@{/pedidos}" class="btn btn-default mr-2">Cancelar</a>
                                    <button type="submit" class="btn btn-success">
                                        <i class="fas fa-save mr-1"></i> Guardar Pedido
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <footer class="main-footer text-sm">
        <strong>Copyright &copy; 2026 RP Electronics.</strong>
    </footer>
</div>

<script src="/plugins/jquery/jquery.min.js"></script>
<script src="/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/dist/js/adminlte.min.js"></script>
</body>
</html>
