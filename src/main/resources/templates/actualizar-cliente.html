<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Actualizar Cliente</title>
</head>
<body>

<h2>Editar Información del Cliente</h2>
<hr>

<form th:action="@{/clientes/guardar}" th:object="${cliente}" method="post">

    <input type="hidden" th:field="*{id_cliente}" />

    <div class="form-group">
        <label for="nombre">Nombre Completo:</label>
        <input type="text" th:field="*{nombre}" id="nombre" placeholder="Ej. Juan Pérez" required />
    </div>

    <div class="form-group">
        <label for="correo">Correo Electrónico:</label>
        <input type="email" th:field="*{correo}" id="correo" placeholder="ejemplo@correo.com" required />
    </div>

    <div class="form-group">
        <label for="telefono">Teléfono:</label>
        <input type="number" th:field="*{telefono}" id="telefono" placeholder="10 dígitos" required />
    </div>

    <br>
    <button type="submit" class="btn-save">Actualizar Datos</button>
    <a th:href="@{/clientes}" class="btn-cancel">Cancelar</a>

</form>

</body>
</html>
