<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Estadísticas | RP Electronics</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <link rel="stylesheet" href="/plugins/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="/dist/css/adminlte.min.css">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
      </li>
    </ul>
  </nav>

  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a th:href="@{/auth/menu}" class="brand-link">
      <img src="/dist/img/AdminLTELogo.png" alt="Logo" class="brand-image img-circle elevation-3" style="opacity: .8">
      <span class="brand-text font-weight-light">RP Electronics</span>
    </a>

    <div class="sidebar">
      <div class="user-panel mt-3 pb-3 mb-3 d-flex">
        <div class="image">
          <img src="/dist/img/user2-160x160.jpg" class="img-circle elevation-2" alt="User Image">
        </div>
        <div class="info">
          <a href="#" class="d-block" th:text="${usuario.nombre}">Nombre de usuario</a>
        </div>
      </div>

      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column" role="menu">
          <li class="nav-item"><a th:href="@{/auth/menu}" class="nav-link"><i class="nav-icon fas fa-home"></i><p>Inicio</p></a></li>
          <li class="nav-item"><a th:href="@{/clientes}" class="nav-link"><i class="nav-icon fas fa-users"></i><p>Clientes</p></a></li>
          <li class="nav-item"><a th:href="@{/pedidos}" class="nav-link"><i class="nav-icon fas fa-shopping-cart"></i><p>Pedidos</p></a></li>
          <li class="nav-item"><a th:href="@{/auth/estadisticas}" class="nav-link active"><i class="nav-icon fas fa-chart-bar"></i><p>Estadísticas</p></a></li>
          <li class="nav-item border-top mt-2"><a th:href="@{/auth/logout}" class="nav-link"><i class="nav-icon fas fa-sign-out-alt text-danger"></i><p>Salir</p></a></li>
        </ul>
      </nav>
    </div>
  </aside>

  <div class="content-wrapper">
    <section class="content-header">
      <div class="container-fluid">
        <h1><i class="fas fa-microchip mr-2"></i>Análisis de RP Electronics</h1>
      </div>
    </section>

    <section class="content">
      <div class="container-fluid">

        <h5 class="mb-2 mt-4 text-primary"><i class="fas fa-user-friends mr-1"></i> Métricas de Clientes</h5>
        <div class="row">
          <div class="col-md-6">
            <div class="card card-primary card-outline">
              <div class="card-header border-0">
                <h3 class="card-title">Crecimiento de Cartera</h3>
              </div>
              <div class="card-body">
                <canvas id="clientesBarChart" style="min-height: 250px; height: 250px;"></canvas>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="card card-primary card-outline">
              <div class="card-header border-0">
                <h3 class="card-title">Clientes por Tipo</h3>
              </div>
              <div class="card-body">
                <canvas id="clientesPieChart" style="min-height: 250px; height: 250px;"></canvas>
              </div>
            </div>
          </div>
        </div>

        <h5 class="mb-2 mt-4 text-success"><i class="fas fa-boxes mr-1"></i> Métricas de Pedidos</h5>
        <div class="row">
          <div class="col-md-6">
            <div class="card card-success card-outline">
              <div class="card-header border-0">
                <h3 class="card-title">Flujo de Ventas Semanal</h3>
              </div>
              <div class="card-body">
                <canvas id="pedidosLineChart" style="min-height: 250px; height: 250px;"></canvas>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="card card-success card-outline">
              <div class="card-header border-0">
                <h3 class="card-title">Estado de Pedidos</h3>
              </div>
              <div class="card-body">
                <canvas id="pedidosDonutChart" style="min-height: 250px; height: 250px;"></canvas>
              </div>
            </div>
          </div>
        </div>

      </div>
    </section>
  </div>

  <footer class="main-footer text-sm">
    <strong>RP Electronics &copy; 2026.</strong>
  </footer>
</div>

<script src="/plugins/jquery/jquery.min.js"></script>
<script src="/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/plugins/chart.js/Chart.min.js"></script>
<script src="/dist/js/adminlte.min.js"></script>

<script th:inline="javascript">
  $(function () {
    var clEne = /*[[${clientesEne}]]*/ 0;
    var clFeb = /*[[${clientesFeb}]]*/ 0;
    var clMar = /*[[${clientesMar}]]*/ 0;
    var clAbr = /*[[${clientesAbr}]]*/ 0;

    // --- GRÁFICAS DE CLIENTES ---
    // 1. Barras
    new Chart($('#clientesBarChart').get(0).getContext('2d'), {
      type: 'bar',
      data: {
        labels: ['Enero', 'Febrero', 'Marzo', 'Abril'],
        datasets: [{ label: 'Nuevos Clientes', backgroundColor: '#007bff', data: [clEne, clFeb, clMar, clAbr] }]
      },
      options: { maintainAspectRatio: false, responsive: true }
    });

    // 2. Pastel
    new Chart($('#clientesPieChart').get(0).getContext('2d'), {
      type: 'pie',
      data: {
        labels: ['Minoristas', 'Mayoristas', 'Técnicos'],
        datasets: [{ data: [50, 30, 20], backgroundColor: ['#007bff', '#6610f2', '#3c8dbc'] }]
      },
      options: { maintainAspectRatio: false, responsive: true }
    });

    // --- GRÁFICAS DE PEDIDOS ---
    // 3. Líneas
    new Chart($('#pedidosLineChart').get(0).getContext('2d'), {
      type: 'line',
      data: {
        labels: ['Lun', 'Mar', 'Mie', 'Jue', 'Vie', 'Sab'],
        datasets: [{ label: 'Pedidos Realizados', borderColor: '#28a745', backgroundColor: 'rgba(40,167,69,0.1)', data: [12, 19, 15, 25, 30, 10], fill: true }]
      },
      options: { maintainAspectRatio: false, responsive: true }
    });

    // 4. Dona
    var pagados = /*[[${pedidosPagados}]]*/ 0;
    var pendientes = /*[[${pedidosPendientes}]]*/ 0;
    var enviados = /*[[${pedidosEnviados}]]*/ 0;
    var cancelados = /*[[${pedidosCancelados}]]*/ 0;

    new Chart($('#pedidosDonutChart').get(0).getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: ['Pagado', 'Pendiente', 'Enviado', 'Cancelado'],
        datasets: [{ data: [pagados, pendientes, enviados, cancelados], backgroundColor: ['#28a745', '#ffc107', '#17a2b8', '#dc3545'] }]
      },
      options: { maintainAspectRatio: false, responsive: true }
    });
  })
</script>
</body>
</html>
